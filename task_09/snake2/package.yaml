name:                snake2
version:             0.1.0.0
author:              "Mariusz Nowostawski"
maintainer:          "mariusz.nowostawski@ntnu.no"
copyright:           "2023 (C) Nowostawski"
license:             BSD-3-Clause

extra-source-files:
- README.md

description: Snake game — intentionally bad code for educational comparison with snake1.

dependencies:
- base >= 4.7 && < 5
- brick
- vty
- vty-unix
- random
- containers

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  exposed-modules:
    - Types
    - Logic
    - Render
    - Game

executables:
  snake2-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - snake2

tests:
  snake2-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - snake2

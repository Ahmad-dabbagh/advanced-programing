name:                snake1
version:             0.1.0.0
github:              "marni/snake1"
license:             BSD-3-Clause
author:              "Mariusz Nowostawski"
maintainer:          "mariusz.nowostawski@ntnu.no"
copyright:           "2023 (C) Nowostawski"

extra-source-files:
- README.md
- CHANGELOG.md

description:         Please see the README on GitHub at <https://github.com/marni/snake1#readme>

dependencies:
- base >= 4.7 && < 5
- brick
- vty
- vty-unix
- random
- containers

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  exposed-modules:
    - Types
    - Logic
    - Render
    - Game

executables:
  snake1-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - snake1

tests:
  snake1-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - snake1
    - doctest
